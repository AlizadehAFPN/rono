name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false # never cancel a running deploy

env:
  AWS_REGION: eu-north-1
  AWS_ACCOUNT_ID: "646167485518"
  ECR_REGISTRY: 646167485518.dkr.ecr.eu-north-1.amazonaws.com
  ECS_CLUSTER: rono-prod
  BACKEND_SERVICE: rono-prod-backend
  FRONTEND_SERVICE: rono-prod-frontend

jobs:
  deploy:
    name: Build, Migrate & Deploy → Production
    runs-on: ubuntu-latest
    environment: production # requires manual approval (configure in GitHub Environments)

    permissions:
      id-token: write # Required for OIDC
      contents: write # Required to push git tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS auth via OIDC (no static keys) ─────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/rono-github-prod-deploy
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR login ────────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker Buildx ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push backend ─────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/rono/backend:cache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/rono/backend:cache,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/rono/backend:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/rono/backend:latest

      # ── Build & push frontend ────────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: runner
          push: true
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/rono/frontend:cache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/rono/frontend:cache,mode=max
          tags: |
            ${{ env.ECR_REGISTRY }}/rono/frontend:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/rono/frontend:latest

      # ── Render migration task definition with new backend image ─────────────
      - name: Render migration task definition
        id: render-migration
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: rono-prod-migration
          container-name: migration
          image: ${{ env.ECR_REGISTRY }}/rono/backend:${{ github.sha }}

      # ── Run Alembic migrations ───────────────────────────────────────────────
      - name: Run database migrations
        id: migration
        run: |
          # Register the rendered task definition to get a new revision ARN
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://${{ steps.render-migration.outputs.task-definition }}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $BACKEND_SERVICE \
            --query 'services[0].networkConfiguration' \
            --output json)

          echo "Starting migration task: $NEW_TASK_DEF_ARN"
          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition $NEW_TASK_DEF_ARN \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

          echo "Waiting for migration to complete..."
          aws ecs wait tasks-stopped \
            --cluster $ECS_CLUSTER \
            --tasks $TASK_ARN

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration FAILED with exit code $EXIT_CODE — rolling back is safe, services still run old code"
            exit 1
          fi
          echo "Migration completed successfully"

      # ── Update backend service ───────────────────────────────────────────────
      - name: Render new backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: rono-prod-backend
          container-name: backend
          image: ${{ env.ECR_REGISTRY }}/rono/backend:${{ github.sha }}

      - name: Deploy backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Update frontend service ──────────────────────────────────────────────
      - name: Render new frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: rono-prod-frontend
          container-name: frontend
          image: ${{ env.ECR_REGISTRY }}/rono/frontend:${{ github.sha }}

      - name: Deploy frontend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Tag the release in git ───────────────────────────────────────────────
      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "deploy-$(date +%Y%m%d-%H%M%S)" -m "Production deploy ${{ github.sha }}"
          git push origin --tags

      # ── Notify ──────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment successful"
            echo "   Commit: ${{ github.sha }}"
            echo "   Deployed by: ${{ github.actor }}"
          else
            echo "❌ Production deployment failed — ECS circuit breaker will prevent bad code from serving traffic"
          fi

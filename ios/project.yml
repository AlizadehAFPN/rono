name: Synapse
options:
  bundleIdPrefix: dev.getjanus.synapse
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: tr
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.0.0"

targets:
  Synapse:
    type: application
    platform: iOS
    sources:
      - path: Synapse
    dependencies:
      - package: Kingfisher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.getjanus.synapse
        PRODUCT_NAME: Synapse
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        INFOPLIST_KEY_CFBundleDisplayName: Synapse
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleLocalizations: "tr en"
  SynapseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SynapseTests
    dependencies:
      - target: Synapse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.getjanus.synapse.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Synapse:
    build:
      targets:
        Synapse: all
        SynapseTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SynapseTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

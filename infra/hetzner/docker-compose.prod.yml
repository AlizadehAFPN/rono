services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: adaptive_learn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${POSTGRES_PASSWORD}@postgres:5432/adaptive_learn
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${PUBLIC_URL}
      COOKIE_SECURE: "true"
    volumes:
      - uploads_data:/home/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: runner
      args:
        INTERNAL_API_URL: http://backend:8000
    environment:
      INTERNAL_API_URL: http://backend:8000
      NODE_ENV: production
    # Published only on localhost — the host's existing nginx reverse-proxies to it.
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:
